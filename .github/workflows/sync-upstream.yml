name: Sync upstream

on:
  schedule:
    # Run daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/generalaction/emdash.git
          git fetch upstream main

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -eq 0 ]; then
            echo "Already up to date with upstream."
          else
            echo "$BEHIND commit(s) behind upstream."
          fi

      - name: Attempt rebase
        if: steps.check.outputs.behind != '0'
        id: rebase
        run: |
          if git rebase upstream/main; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            git rebase --abort
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push clean rebase
        if: steps.check.outputs.behind != '0' && steps.rebase.outputs.conflict == 'false'
        run: git push --force-with-lease origin refs/heads/main:refs/heads/main

      # --- Conflict path: use Claude Code to resolve ---
      - name: Install Claude Code
        if: steps.rebase.outputs.conflict == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve conflicts with Claude Code
        if: steps.rebase.outputs.conflict == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Start the rebase again so Claude can see the conflicts
          git rebase upstream/main || true

          claude -p "
            We are rebasing our fork onto upstream/main and hit conflicts.
            Resolve all merge conflicts in the working tree. Our fork changes
            should be preserved where possible, but defer to upstream for
            structural refactors. After resolving each file, stage it with
            git add. Then run: git rebase --continue
            Repeat until the rebase is fully complete.
          " --allowedTools 'Bash,Read,Edit,Write,Glob,Grep'

      - name: Push resolved rebase
        if: steps.rebase.outputs.conflict == 'true'
        run: git push --force-with-lease origin refs/heads/main:refs/heads/main

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Upstream sync failed',
              body: `The automated upstream sync workflow failed.\n\n[Run logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['sync']
            });
